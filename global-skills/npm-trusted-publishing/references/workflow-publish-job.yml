# Unified npm OIDC publish pattern — merge into an existing CI workflow.
# Replace EXISTING_TEST_JOB with your test/ci job id (e.g. test, ci, build).

# --- Add to workflow `on:` (merge with existing triggers) ---
# on:
#   push:
#     branches: [main]      # keep existing branch triggers
#     tags:
#       - 'v*'
#   pull_request:
#     branches: [main]      # keep existing PR triggers
#   workflow_dispatch:
#     inputs:
#       publish:
#         description: Publish to npm after tests pass (requires npm Trusted Publisher)
#         type: boolean
#         default: false

# --- Add as a new job after the existing test job ---
publish:
  needs: EXISTING_TEST_JOB
  if: >
    needs.EXISTING_TEST_JOB.result == 'success' &&
    (
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    )
  runs-on: ubuntu-latest
  permissions:
    id-token: write # required for npm OIDC trusted publishing
    contents: read
  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org
        cache: false

    - name: Ensure npm supports trusted publishing
      run: npm install -g npm@latest

    - run: npm ci
    - run: npm run build

    - name: Publish to npm via OIDC trusted publishing
      run: npm publish

# npm Trusted Publisher must list THIS workflow's filename exactly (e.g. ci.yml).
